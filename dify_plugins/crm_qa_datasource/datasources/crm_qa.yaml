datasource: crm_qa
label:
  en_US: CRM QA (Reviewed)
  zh_Hans: CRM QA（已审核）
description:
  en_US: Sync reviewed QA by group.
  zh_Hans: 按客户群同步已审核 QA。
params:
  - variable: group_id
    label:
      en_US: Group ID
      zh_Hans: 客户群 ID
    type: text-input
    required: true
  - variable: updated_since
    label:
      en_US: Updated Since (ISO8601)
      zh_Hans: 起始时间（ISO8601）
    type: text-input
    required: false
output_schema:
  type: object
  properties:
    content:
      type: string
